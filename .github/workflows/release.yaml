# Updated release.yaml
name: Release and Deploy

on:
  push:
    branches: ['main']

jobs:
  release:
    permissions:
      contents: write
      issues: write
      pull-requests: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'
          
      - run: npm ci

      - name: Build Engine
        run: npm run build:engine

      - name: Run Tests
        run: npm test

      # Run semantic-release first to update version
      - name: Semantic Release
        id: semantic
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          
      # Only proceed with deployment if a new release was created
      - name: Build
        if: steps.semantic.outcome == 'success'
        run: npm run build
        env:
          VITE_APP_VERSION: ${{ steps.semantic.outputs.new_release_version || '' }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          
      - name: Setup Pages
        if: steps.semantic.outcome == 'success'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: steps.semantic.outcome == 'success'
        uses: actions/upload-pages-artifact@v4
        with:
          path: './app/dist'

      - name: Deploy to GitHub Pages
        if: steps.semantic.outcome == 'success'
        id: deployment
        uses: actions/deploy-pages@v5
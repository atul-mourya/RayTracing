# Updated release.yaml
name: Release and Deploy

on:
  push:
    branches: ['main']
  workflow_dispatch:   # manual trigger to (re)deploy Pages without cutting a release

jobs:
  release:
    if: "!startsWith(github.event.head_commit.message, 'chore(release):')"
    permissions:
      contents: write
      issues: write
      pull-requests: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'
          
      - run: npm ci

      - name: Build Engine
        run: npm run build:engine

      - name: Run Tests
        run: npm test

      # Run semantic-release first to update version
      - name: Semantic Release
        id: semantic
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          
      # Deploy on a fresh release, or on a manual workflow_dispatch (e.g. to
      # ship a Pages build for an already-tagged version).
      - name: Resolve app version
        id: appver
        if: steps.semantic.outputs.new-release-published == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          VERSION="${{ steps.semantic.outputs.new-release-version }}"
          [ -z "$VERSION" ] && VERSION="$(node -p "require('./rayzee/package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build
        if: steps.semantic.outputs.new-release-published == 'true' || github.event_name == 'workflow_dispatch'
        run: npm run build
        env:
          VITE_APP_VERSION: ${{ steps.appver.outputs.version }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Setup Pages
        if: steps.semantic.outputs.new-release-published == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: steps.semantic.outputs.new-release-published == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v4
        with:
          path: './app/dist'

      - name: Deploy to GitHub Pages
        if: steps.semantic.outputs.new-release-published == 'true' || github.event_name == 'workflow_dispatch'
        id: deployment
        uses: actions/deploy-pages@v5
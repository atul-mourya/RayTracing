<!DOCTYPE html>
<html>
<head><title>Rayzee Engine</title></head>
<body style="margin:0; background:#111;">
    <div><div><div>
        <canvas id="c" width="512" height="512"></canvas>
    </div></div></div>
    <script type="module">
        import { PathTracerApp } from './src/core/index.js';
        const engine = new PathTracerApp(document.getElementById('c'), null, { autoResize: false });
        await engine.init();
        await engine.loadEnvironment('/hdri/Polyhaven/raw/brown_photostudio_02_1k.hdr');
        await engine.loadModel('/models/CornellBox1.glb');
        engine.animate();
        engine.reset();
        window.engine = engine;
    </script>
</body>
</html>
